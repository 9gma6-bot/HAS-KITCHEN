name: Populate app folder

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  populate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Restore app files
        shell: bash
        run: |
          rm -rf app
          mkdir -p app
          base64 -d > /tmp/has-kitchen-app.zip <<'PAYLOAD'

PAYLOAD
          unzip -o /tmp/has-kitchen-app.zip -d app
          rm -f .github/workflows/populate-app.yml

      - name: Commit app folder
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app .github/workflows/populate-app.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add HAS Kitchen app files"
            git push
          fi
